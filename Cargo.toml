# path = "apps/gtos_instrument_vision.rs"
# Maps VR/Spatial camera coordinates instantly into 24-byte FFI payloads.

# [[bin]]
# name = "gtos-instrument-biometrics"
# path = "apps/gtos_bio_metrics.rs"
# Maps secure fingerprint, iris, and pulse invariants directly to geometric chords.

# [[bin]]
# name = "gtos-instrument-robotics"
# path = "apps/gtos_robot_interface.rs"
# Routes 3-axis physical voltage metrics to external actuation hardware lanes.

# [[bin]]
